name: Build Windows Executable

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create bluetooth stub
        shell: bash
        run: |
          mkdir -p bluetooth_stub
          echo 'def read_local_bdaddr():
              return ("00:00:00:00:00:00", 0)' > bluetooth_stub/__init__.py

      - name: Set up Python and cache
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary pyinstaller==6.11.1 bleak==1.0.1 PyYAML==6.0.2 pywin32==306 vgamepad==0.1.0
          pip install --prefer-binary winrt-runtime==3.2.1 winrt-Windows.Devices.Bluetooth==3.2.1 winrt-Windows.Devices.Bluetooth.Advertisement==3.2.1 winrt-Windows.Devices.Bluetooth.GenericAttributeProfile==3.2.1 winrt-Windows.Devices.Enumeration==3.2.1 winrt-Windows.Foundation==3.2.1 winrt-Windows.Foundation.Collections==3.2.1 winrt-Windows.Storage.Streams==3.2.1

      - name: Build with PyInstaller
        env:
          PYTHONPATH: bluetooth_stub
        run: pyinstaller gui.py --add-data "resources;resources" --collect-binaries=vgamepad --onefile --name "switch2-controllers-haptics" --noconfirm --hidden-import=bluetooth --hidden-import=midi_player --hidden-import=config --hidden-import=controller --hidden-import=discoverer --hidden-import=virtual_controller --hidden-import=utils

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: switch2-controllers-haptics-windows
          path: dist/switch2-controllers-haptics.exe

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          name: "v1.0.${{ github.run_number }}"
          body: |
            Switch 2 Controllers with MIDI Haptics Singer

            Based on Nadeflore/switch2-controllers with SteamHapticsSinger integration.

            Features:
            - Connect Joy-Con 2, Pro Controller 2, NSO GameCube Controller via Bluetooth
            - Virtual XInput gamepad emulation
            - Mouse mode for Joy-Cons
            - MIDI Haptics Singer - Play MIDI files through Joy-Con HD Rumble motors
            - Configurable button mapping, deadzone, sensitivity

            Prerequisites: Windows 10/11 with Bluetooth, ViGEmBus driver
          files: dist/switch2-controllers-haptics.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"