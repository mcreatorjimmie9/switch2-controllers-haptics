name: Build Windows Executable

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller bleak PyYAML pywin32 winrt-runtime winrt-Windows.Devices.Bluetooth winrt-Windows.Devices.Bluetooth.Advertisement winrt-Windows.Devices.Bluetooth.GenericAttributeProfile winrt-Windows.Devices.Enumeration winrt-Windows.Foundation winrt-Windows.Foundation.Collections winrt-Windows.Storage.Streams vgamepad

      - name: Build with PyInstaller
        run: |
          pyinstaller gui.py --add-data "resources;resources" --collect-binaries=vgamepad --onefile --name "switch2-controllers-haptics" --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: switch2-controllers-haptics-windows
          path: dist/switch2-controllers-haptics.exe

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          name: "v1.0.${{ github.run_number }}"
          body: |
            Switch 2 Controllers with MIDI Haptics Singer

            Based on [Nadeflore/switch2-controllers](https://github.com/Nadeflore/switch2-controllers) with [SteamHapticsSinger](https://github.com/CrazyCritic89/SteamHapticsSinger) integration.

            ## Features
            - Connect Joy-Con 2 (left/right), Pro Controller 2, NSO GameCube Controller to PC via Bluetooth
            - Virtual XInput gamepad emulation
            - Mouse mode for Joy-Cons
            - **MIDI Haptics Singer** - Play MIDI files through Joy-Con HD Rumble motors
              - MIDI Channel 0 → Right Joy-Con
              - MIDI Channel 1 → Left Joy-Con
            - Configurable button mapping, deadzone, sensitivity

            ## Usage
            1. Run `switch2-controllers-haptics.exe`
            2. Connect your Joy-Cons (press a button or hold sync to pair)
            3. Use the "MIDI Haptics Singer" panel at the bottom to load and play `.mid` files
          files: dist/switch2-controllers-haptics.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}