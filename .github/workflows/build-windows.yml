name: Build Windows Executable

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create bluetooth stub
        shell: bash
        run: |
          mkdir -p bluetooth_stub
          echo 'def read_local_bdaddr(): return ("00:00:00:00:00:00", 0)' > bluetooth_stub/__init__.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install core deps (wheels only)
        run: pip install --only-binary=:all: pyinstaller bleak PyYAML pywin32 vgamepad || pip install pyinstaller bleak PyYAML pywin32 vgamepad

      - name: Install winrt deps
        run: pip install winrt-runtime winrt-Windows.Devices.Bluetooth winrt-Windows.Devices.Bluetooth.Advertisement winrt-Windows.Devices.Bluetooth.GenericAttributeProfile winrt-Windows.Devices.Enumeration winrt-Windows.Foundation winrt-Windows.Foundation.Collections winrt-Windows.Storage.Streams

      - name: Build with PyInstaller
        env:
          PYTHONPATH: bluetooth_stub
        run: pyinstaller gui.py --add-data "resources;resources" --collect-binaries=vgamepad --onefile --name "switch2-controllers-haptics" --noconfirm --hidden-import=bluetooth --hidden-import=midi_player --hidden-import=config --hidden-import=controller --hidden-import=discoverer --hidden-import=virtual_controller --hidden-import=utils

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: switch2-controllers-haptics-windows
          path: dist/switch2-controllers-haptics.exe

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          name: "v1.0.${{ github.run_number }}"
          body: |
            Switch 2 Controllers with MIDI Haptics Singer

            Based on Nadeflore/switch2-controllers with SteamHapticsSinger integration.

            Features:
            - Connect Joy-Con 2, Pro Controller 2, NSO GameCube Controller via Bluetooth
            - Virtual XInput gamepad emulation
            - Mouse mode for Joy-Cons
            - MIDI Haptics Singer - Play MIDI files through Joy-Con HD Rumble motors
            - Configurable button mapping, deadzone, sensitivity

            Prerequisites: Windows 10/11 with Bluetooth, ViGEmBus driver
          files: dist/switch2-controllers-haptics.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"